services:
  postgres:
    image: postgres:16
    container_name: talentflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talentflow}
      POSTGRES_USER: ${POSTGRES_USER:-talentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talentflow_dev_password_change_me}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
