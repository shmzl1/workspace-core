[pytest]
testpaths =
    tests/unit/modules/test_attendance_rules_unit.py
    tests/unit/modules/test_attendance_service_unit.py
    tests/unit/modules/test_analytics_module_unit.py
    tests/unit/modules/test_audit_service_unit.py
    tests/unit/modules/test_auth_permissions_unit.py
    tests/unit/modules/test_auth_service_unit.py
    tests/unit/modules/test_employee_service_unit.py
    tests/unit/modules/test_interview_service_unit.py
    tests/unit/modules/test_notification_model_unit.py
    tests/unit/modules/test_payroll_pre_audit_unit.py
    tests/unit/modules/test_policy_service_unit.py
    tests/unit/modules/test_recruitment_candidate_evaluation_unit.py
    tests/unit/agents/test_guardrails_unit.py
    tests/unit/agents/test_run_store_unit.py
    tests/unit/rag/test_splitter_unit.py
    tests/concurrency/test_splitter_concurrency.py
addopts =
    -q
    --strict-markers
    --cov=app.modules.attendance.rules
    --cov=app.modules.analytics
    --cov=app.modules.auth.permissions
    --cov=app.modules.notification.models
    --cov=app.modules.policy.service
    --cov=app.modules.recruitment.services.candidate_evaluation_service
    --cov=app.agents.shared.guardrails
    --cov=app.rag.ingestion.splitter
    --cov=app.agents.runtime.run_store
    --cov-report=term-missing
    --cov-report=html:htmlcov/core
    --cov-fail-under=85
markers =
    concurrency: light concurrency tests
    exception_path: abnormal and extreme input tests
